name: Daily Dashboard

on:
  schedule:
    # Runs at 12:00 UTC = 8:00 AM ET (adjust as needed)
    # Cron syntax: minute hour day-of-month month day-of-week
    - cron: '0 12 * * *'

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit + push the generated HTML

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          OPENWEATHER_API_KEY:    ${{ secrets.OPENWEATHER_API_KEY }}
          NEWS_API_KEY:           ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL:    ${{ secrets.DISCORD_WEBHOOK_URL }}
          FOOTBALL_DATA_API_KEY:  ${{ secrets.FOOTBALL_DATA_API_KEY }}
          FINNHUB_API_KEY:        ${{ secrets.FINNHUB_API_KEY }}
        run: python generate.py

      - name: Commit & push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update dashboard $(date -u +%Y-%m-%d)"
          git push
